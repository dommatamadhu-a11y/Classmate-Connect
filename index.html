<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classmate Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
:root { --primary:#007bff; --bg:#f0f2f5; }
body { font-family:Poppins; background:var(--bg); margin:0; padding-bottom:70px; }
header { background:white; padding:15px; display:flex; justify-content:space-between; }
.section { display:none; padding:10px; }
.active { display:block; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
.btn { background:var(--primary); color:white; border:none; padding:10px; width:100%; border-radius:8px; }
.bottom-nav { position:fixed; bottom:0; width:100%; display:flex; background:white; }
.nav-item { flex:1; text-align:center; padding:10px; }
.active-nav { color:var(--primary); }
.post-img { width:100%; border-radius:10px; }
</style>
</head>

<body>

<div id="login-overlay" style="display:none; position:fixed; width:100%; height:100%; background:white; justify-content:center; align-items:center; flex-direction:column;">
<h2>Classmate Connect</h2>
<button onclick="login()" class="btn">Login with Google</button>
</div>

<header>
<div>
<img id="h-img" width="35">
<span id="u-display"></span>
</div>
<button onclick="logout()">Logout</button>
</header>

<section id="home" class="section active">
<textarea id="msgInput" placeholder="Write post..."></textarea>
<input type="file" id="f-img">
<button onclick="handlePost()" class="btn">Post</button>
<div id="post-container"></div>
</section>

<section id="search" class="section">
<input id="s-inst" placeholder="Institution">
<input id="s-year" placeholder="Year">
<button onclick="search()" class="btn">Search</button>
<div id="search-results"></div>
</section>

<section id="friends" class="section">
<div id="friends-list"></div>
</section>

<section id="profile" class="section">
<input id="p-name-input">
<input id="p-inst">
<input id="p-year">
<input id="p-class">
<input id="p-city">
<button onclick="saveProfile()" class="btn">Save</button>
</section>

<nav class="bottom-nav">
<div class="nav-item active-nav" onclick="show('home',this)">Home</div>
<div class="nav-item" onclick="show('search',this)">Search</div>
<div class="nav-item" onclick="show('friends',this)">Friends</div>
<div class="nav-item" onclick="show('profile',this)">Profile</div>
</nav>

<script src="app.js"></script>
</body>
</html>
