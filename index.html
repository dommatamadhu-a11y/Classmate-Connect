<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Connect - Secure Login</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .auth-box { text-align: center; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 50px; }
        .post-box { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; display: none; }
        button { background-color: #4285F4; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        .post { background: white; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid #007bff; }
        .user-info { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .profile-pic { width: 30px; height: 30px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-ui" class="auth-box">
        <h1>Alumni Connect 🎓</h1>
        <p>Please login to join the wall</p>
        <button onclick="googleLogin()">Login with Google</button>
    </div>

    <div id="post-ui" class="post-box">
        <div class="user-info">
            <span id="user-name">Welcome!</span>
            <button onclick="logout()" style="width: auto; padding: 5px 10px; background: #dc3545; font-size: 12px;">Logout</button>
        </div>
        <textarea id="message" rows="3" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;" placeholder="Write a message..."></textarea>
        <button onclick="sendData()" style="background:#28a745;">Post to Wall</button>
    </div>

    <div id="post-feed"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAWZ2ky33M2U5xSWL-XSkU32y25U-Bwyrc",
        authDomain: "class-connect-b58f0.firebaseapp.com",
        projectId: "class-connect-b58f0",
        databaseURL: "https://class-connect-b58f0-default-rtdb.asia-southeast1.firebasedatabase.app/",
        storageBucket: "class-connect-b58f0.firebasestorage.app",
        messagingSenderId: "836461719745",
        appId: "1:836461719745:web:f827862e4db4954626a440"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    let currentUser = null;

    // Google Login Function
    function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(error => alert(error.message));
    }

    // Logout Function
    function logout() {
        auth.signOut();
    }

    // Check Login Status
    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('post-ui').style.display = 'block';
            document.getElementById('user-name').innerText = "Hello, " + user.displayName;
        } else {
            currentUser = null;
            document.getElementById('login-ui').style.display = 'block';
            document.getElementById('post-ui').style.display = 'none';
        }
    });

    // Send Message
    function sendData() {
        const msg = document.getElementById('message').value;
        if (msg && currentUser) {
            database.ref('posts').push({
                username: currentUser.displayName,
                text: msg,
                email: currentUser.email,
                time: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('message').value = "";
            });
        }
    }

    // Feed Sync
    database.ref('posts').on('value', (snapshot) => {
        const feed = document.getElementById('post-feed');
        feed.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.values(data).reverse().forEach(post => {
                feed.innerHTML += `
                    <div class="post">
                        <strong>${post.username}</strong>
                        <p>${post.text}</p>
                        <small style="color:#999">${post.time}</small>
                    </div>`;
            });
        }
    });
</script>

</body>
</html>
