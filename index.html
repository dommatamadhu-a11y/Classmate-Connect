<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classmate Connect</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f8;}
header{background:#1976d2;color:white;padding:15px;text-align:center;font-size:20px;}
header button{float:right;background:#fff;color:#1976d2;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;}
nav{display:flex;justify-content:space-around;background:white;border-bottom:1px solid #ddd;}
nav button{background:none;border:none;padding:12px;font-size:14px;cursor:pointer;}
.section{display:none;padding:15px;}
.card{background:white;padding:12px;border-radius:10px;margin:10px 0;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.chatBox{height:50vh;overflow:auto;background:white;padding:10px;}
.msg{padding:8px;border-radius:10px;margin:6px;max-width:70%;}
.me{background:#c8e6c9;margin-left:auto;}
.other{background:#eeeeee;}
.msg img{max-width:150px;border-radius:10px;}
</style>
</head>
<body>

<header>
Classmate Connect
<button onclick="logout()">Logout</button>
</header>

<nav>
<button onclick="showSection('find')">Find</button>
<button onclick="showSection('friends')">Friends</button>
<button onclick="showSection('chats')">Chats</button>
<button onclick="showSection('groups')">Groups</button>
<button onclick="showSection('profile')">Profile</button>
</nav>

<!-- Login -->
<div id="login" class="section" style="display:block">
<h3>Login</h3>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- Profile -->
<div id="profile" class="section">
<h3>Create Profile</h3>
<input id="name" placeholder="Full Name"><br><br>
<input id="nickname" placeholder="Nickname"><br><br>
<input id="institution" placeholder="Institution"><br><br>
<input id="course" placeholder="Course / Class"><br><br>
<input id="year" placeholder="Year / Batch"><br><br>
<input id="city" placeholder="City"><br><br>
<button onclick="saveProfile()">Save Profile</button>
</div>

<!-- Find -->
<div id="find" class="section">
<h3>Find Batchmates</h3>
<input id="searchInstitution" placeholder="Institution"><br><br>
<input id="searchYear" placeholder="Year / Batch"><br><br>
<button onclick="findClassmates()">Search</button>
<br><br>
<div id="results"></div>
</div>

<!-- Friends -->
<div id="friends" class="section">
<h3>Friends</h3>
<div id="friendsList"></div>
</div>

<!-- Chats -->
<div id="chats" class="section">
<h3>Chats</h3>
<div id="chatList"></div>
</div>

<!-- Groups -->
<div id="groups" class="section">
<h3>Your Batch Groups</h3>
<div id="groupList"></div>
</div>

<!-- Chat Screen -->
<div id="chatScreen" class="section">
<h3 id="chatName"></h3>
<div class="chatBox" id="chatBox"></div>
<br>
<input id="msgInput" placeholder="Type message">
<input type="file" id="imgFile" style="display:none">
<button onclick="pickImage()">📎</button>
<button onclick="sendMsg()">Send</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
