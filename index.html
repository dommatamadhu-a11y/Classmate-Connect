<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Classmate Connect</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

nav button{
background:none;
border:none;
font-size:14px;
}

.section{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.primary{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
}

.card{
background:#e3f2fd;
padding:12px;
border-radius:10px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#1976d2;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:10px;
}

.row{
display:flex;
align-items:center;
}

.chatBox{
height:60vh;
overflow:auto;
background:white;
padding:10px;
}

.msg{
padding:8px;
border-radius:10px;
margin:6px;
max-width:60%;
}

.me{
background:#c8e6c9;
margin-left:auto;
}

.other{
background:#eeeeee;
}

</style>

</head>

<body>

<header>Classmate Connect</header>

<!-- LOGIN -->

<div id="login" class="section" style="display:block">

<h3>Login with Phone</h3>

<input id="phone" placeholder="+91XXXXXXXXXX">

<div id="recaptcha"></div>

<button class="primary" onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<button class="primary" onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- PROFILE -->

<div id="profile" class="section">

<h3>Create Profile</h3>

<input id="name" placeholder="Name">

<input id="institution" placeholder="School / College / Workplace">

<input id="class" placeholder="Class">

<input id="year" placeholder="Year">

<input id="city" placeholder="City">

<select id="type">
<option value="school">School</option>
<option value="college">College</option>
<option value="work">Workplace</option>
<option value="alumni">Alumni</option>
</select>

<button class="primary" onclick="saveProfile()">Save Profile</button>

</div>

<nav>

<button onclick="showSection('find')">Find Classmates</button>

<button onclick="showSection('requests')">Requests</button>

<button onclick="showSection('friends')">Friends</button>

<button onclick="showSection('chat')">Chats</button>

</nav>

<div id="find" class="section">

<h3>Find Classmates</h3>

<input id="searchInstitution" placeholder="Institution">

<input id="searchYear" placeholder="Year">

<button class="primary" onclick="findUsers()">Search</button>

<div id="results"></div>

</div>

<div id="requests" class="section">

<h3>Friend Requests</h3>

<div id="requestList"></div>

</div>

<div id="friends" class="section">

<h3>Your Friends</h3>

<div id="friendsList"></div>

</div>

<div id="chat" class="section">

<h3 id="chatName"></h3>

<div class="chatBox" id="chatBox"></div>

<input id="msgInput" placeholder="Type message">

<button class="primary" onclick="sendMsg()">Send</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
