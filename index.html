<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Classmate Connect</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */

.header{
background:#1976d2;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

/* SECTION */

.section{
display:none;
padding:15px;
padding-bottom:70px;
}

/* CARD */

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* INPUT */

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* BUTTON */

button{
background:#1976d2;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
margin-top:5px;
}

/* LOGIN */

#login{
display:block;
text-align:center;
margin-top:100px;
}

/* BOTTOM NAV */

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
border-top:1px solid #ccc;
}

.bottom-nav button{
flex:1;
background:none;
color:#1976d2;
font-size:12px;
padding:10px;
}

</style>

</head>

<body>

<div class="header">
Classmate Connect
</div>

<!-- LOGIN -->

<div id="login" class="section">

<h2>Welcome 👋</h2>
<p id="userInfo"></p>

<button onclick="googleLogin()">Continue with Google</button>

</div>

<!-- FIND -->

<div id="find" class="section">

<h3>Find Batchmates</h3>

<input id="searchInstitution" placeholder="School / College">
<input id="searchYear" placeholder="Year">

<button onclick="loadUsers()">Search</button>

<div id="findList"></div>

</div>

<!-- FRIENDS -->

<div id="friends" class="section">
<h3>Friends</h3>
<div id="friendsList"></div>
</div>

<!-- CHATS -->

<div id="chats" class="section">
<h3>Chats</h3>
<div id="chatList"></div>
</div>

<!-- GROUPS -->

<div id="groups" class="section">
<h3>Groups</h3>
<div id="groupList"></div>
</div>

<!-- MEMORIES -->

<div id="memories" class="section">

<h3>Memories</h3>

<input id="memoryCaption" placeholder="Write memory">
<button onclick="uploadMemory()">Post</button>

<div id="memoriesList"></div>

</div>

<!-- NOTIFICATIONS -->

<div id="notifications" class="section">
<h3>Notifications</h3>
<div id="notificationsList"></div>
</div>

<!-- PROFILE -->

<div id="profile" class="section">

<h3>Profile</h3>

<input id="name" placeholder="Name">
<input id="institution" placeholder="School / College">
<input id="year" placeholder="Year">

<button onclick="saveProfile()">Save</button>
<button onclick="logout()">Logout</button>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<button onclick="showSection('find')">🏠 Home</button>
<button onclick="showSection('friends')">👥 Friends</button>
<button onclick="showSection('chats')">💬 Chat</button>
<button onclick="showSection('groups')">👨‍🎓 Groups</button>
<button onclick="showSection('profile')">👤 Profile</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
