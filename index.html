<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classmate Connect</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

/* TOP NAV */
.top-nav{
display:flex;
overflow-x:auto;
background:#1565c0;
}

.top-nav button{
flex:1;
min-width:90px;
border:none;
background:#1565c0;
color:white;
padding:12px;
}

/* SECTION */
.section{
display:none;
padding:15px;
padding-bottom:80px;
}

/* CARD */
.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:8px;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */
button{
background:#1976d2;
color:white;
border:none;
padding:8px;
margin-top:5px;
border-radius:5px;
}

/* LOGIN */
#login{
display:block;
text-align:center;
margin-top:100px;
}

/* CHAT */
.chat-bubble{
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:70%;
}

.me{
background:#1976d2;
color:white;
margin-left:auto;
}

.other{
background:#e0e0e0;
}

/* CHAT INPUT */
.chat-input{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
padding:10px;
}

.chat-input input{
flex:1;
}

</style>

</head>

<body>

<div class="header">Classmate Connect</div>

<!-- TOP NAV -->
<div class="top-nav">
<button onclick="showSection('find')">Find</button>
<button onclick="showSection('friends')">Friends</button>
<button onclick="showSection('chats')">Chat</button>
<button onclick="showSection('groups')">Groups</button>
<button onclick="showSection('memories')">Memories</button>
<button onclick="showSection('notifications')">🔔</button>
<button onclick="showSection('profile')">Profile</button>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<h2>Welcome 👋</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- FIND -->
<div id="find" class="section">
<h3>Find Batchmates</h3>

<input id="searchInstitution" placeholder="Institution">
<input id="searchYear" placeholder="Year">
<input id="searchCity" placeholder="City">

<button onclick="loadUsers()">Search</button>

<div id="findList"></div>
</div>

<!-- FRIENDS -->
<div id="friends" class="section">
<h3>Friends / Requests</h3>
<div id="friendsList"></div>
</div>

<!-- CHATS -->
<div id="chats" class="section">
<h3>Chats</h3>

<div id="chatList"></div>

<div class="chat-input">
<input id="chatText" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<!-- GROUPS -->
<div id="groups" class="section">
<h3>Groups</h3>
<div id="groupList"></div>
</div>

<!-- MEMORIES -->
<div id="memories" class="section">
<h3>Memories</h3>

<input id="memoryCaption" placeholder="Write memory">
<button onclick="uploadMemory()">Post</button>

<div id="memoriesList"></div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications" class="section">
<h3>Notifications</h3>
<div id="notificationsList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">

<h3>Profile</h3>

<input id="nameInput" placeholder="Name">
<input id="institutionInput" placeholder="Institution">
<input id="yearInput" placeholder="Year">
<input id="cityInput" placeholder="City">

<button onclick="saveProfile()">Save</button>
<button onclick="logout()">Logout</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
