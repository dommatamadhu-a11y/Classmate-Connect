<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classmate Connect Global</title>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.png">
    <style>
        /* Modern Design System */
        :root {
            --bg: #f7f6f2; --surface: #ffffff; --surface-2: #fbfbf9;
            --text: #28251d; --text-muted: #7a7974;
            --primary: #01696f; --primary-hover: #0c4e54;
            --radius-md: 0.75rem; --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
            --transition: 180ms cubic-bezier(0.16,1,0.3,1);
            --text-base: clamp(1rem, 2.5vw, 1.125rem);
            --space-4: 1rem; --space-6: 1.5rem;
        }
        [data-theme="dark"] {
            --bg: #171614; --surface: #1c1b19; --surface-2: #201f1d;
            --text: #cdccca; --text-muted: #797876;
            --primary: #4f98a3; --primary-hover: #227f8b;
        }
        
        * { box-sizing: border-box; margin: 0; }
        body { 
            font-family: 'General Sans', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            line-height: 1.6; min-height: 100dvh; 
            padding-bottom: env(safe-area-inset-bottom, 80px);
        }
        header { 
            background: var(--surface); padding: var(--space-4); 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100;
        }
        .section { display: none; padding: var(--space-4); max-width: 800px; margin: 0 auto; }
        .active { display: block; }
        .card { 
            background: var(--surface); margin-bottom: var(--space-6); 
            padding: var(--space-6); border-radius: var(--radius-md); 
            box-shadow: var(--shadow-sm); 
        }
        input, textarea { 
            width: 100%; padding: var(--space-4); margin: var(--space-4) 0; 
            border: 1px solid color-mix(in oklch, var(--text) 0.12); 
            border-radius: calc(var(--radius-md) - 0.125rem); 
            font-size: var(--text-base); transition: var(--transition);
        }
        input:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px color-mix(in oklch, var(--primary) 0.2); }
        .btn-primary { 
            background: var(--primary); color: white; border: none; 
            padding: var(--space-4); border-radius: var(--radius-md); 
            width: 100%; cursor: pointer; font-weight: 600; 
            font-size: var(--text-base); transition: var(--transition);
        }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            background: var(--surface); border-top: 1px solid color-mix(in oklch, var(--text) 0.1); 
            padding: var(--space-4) 0;
        }
        .nav-item { text-align: center; color: var(--text-muted); cursor: pointer; flex: 1; padding: var(--space-4); }
        .nav-item.active-nav { color: var(--primary); font-weight: 600; }
        .story-container { display: flex; overflow-x: auto; gap: var(--space-4); padding: var(--space-4) 0; scroll-snap-type: x mandatory; }
        .story-circle { 
            width: 70px; height: 70px; border-radius: 50%; 
            border: 3px solid var(--primary); flex-shrink: 0; overflow: hidden; 
            background: var(--surface); scroll-snap-align: center;
        }
        .poll-option { 
            background: var(--surface-2); border: 1px solid color-mix(in oklch, var(--text) 0.1); 
            padding: var(--space-4); margin: var(--space-2) 0; border-radius: var(--radius-md); 
            cursor: pointer; transition: var(--transition);
        }
        .poll-option:hover { background: color-mix(in oklch, var(--primary) 8%, var(--surface)); }
        #login-overlay { 
            position: fixed; inset: 0; background: var(--surface); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; text-align: center; gap: var(--space-6);
        }
        @media (min-width: 768px) { 
            .bottom-nav { display: none; } 
            body { padding-bottom: 0; }
            header { max-width: 800px; margin: 0 auto; border-radius: 0 0 var(--radius-md) var(--radius-md); }
        }
        /* Dark mode toggle */
        .theme-toggle { cursor: pointer; font-size: 1.2rem; }
    </style>
    <!-- Firebase v10+ -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getDatabase, ref, onValue, push, set, update, remove, orderByChild, equalTo, transaction } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
        window.firebaseExports = { initializeApp, getAuth, getDatabase, ref, onValue, push, set, update, remove, orderByChild, equalTo, transaction, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut };
    </script>
</head>
<body data-theme="light">
    <!-- Rest of HTML same as yours, but with updated classes -->
    <div id="login-overlay">
        <h1>Classmate Connect</h1>
        <p>Connect with your classmates worldwide</p>
        <button onclick="login()" class="btn-primary">Login with Google</button>
    </div>
    <!-- Header, sections, nav same structure, but with new CSS classes -->
    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
        // Dark mode toggle
        document.querySelector('.theme-toggle')?.addEventListener('click', () => {
            document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        });
    </script>
</body>
</html>
