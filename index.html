<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classmate Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-overlay" class="overlay">
        <div class="login-card glass">
            <h2>Welcome to Classmate Connect</h2>
            <p>Connect with your old friends easily</p>
            <button onclick="login()" class="btn-primary"><i class="fab fa-google"></i> Sign in with Google</button>
        </div>
    </div>

    <header class="glass">
        <div class="header-content">
            <div class="user-info">
                <img id="h-img" src="https://via.placeholder.com/40" alt="Profile">
                <div id="group-tag" style="display:none;"><small id="group-text"></small></div>
            </div>
            <div class="header-actions">
                <i class="fas fa-moon" onclick="toggleDarkMode()"></i>
                <div class="notif-icon" onclick="show('notifications', this)">
                    <i class="fas fa-bell"></i>
                    <span id="notif-badge" class="badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="quote-container">
        <p id="daily-quote" class="glass-text">"Loading inspiration..."</p>
    </div>

    <main>
        <section id="home" class="section active">
            <div id="story-list" class="story-container">
                </div>

            <div class="post-box glass card">
                <textarea id="msgInput" placeholder="What's on your mind, classmate?"></textarea>
                
                <div id="poll-creator" style="display:none; margin:10px 0; padding:10px; border-top:1px dashed #ccc;">
                    <input type="text" id="poll-q" placeholder="Question?">
                    <input type="text" id="poll-o1" placeholder="Option 1">
                    <input type="text" id="poll-o2" placeholder="Option 2">
                </div>

                <div class="post-options">
                    <label title="Image"><i class="fas fa-image"></i><input type="file" id="f-img" accept="image/*" hidden></label>
                    <label title="Video"><i class="fas fa-video"></i><input type="file" id="f-vid" accept="video/*" hidden></label>
                    <label title="PDF"><i class="fas fa-file-pdf"></i><input type="file" id="f-pdf" accept="application/pdf" hidden></label>
                    <i class="fas fa-poll" onclick="togglePollCreator()" title="Create Poll"></i>
                    <button onclick="handlePost()" class="btn-send"><i class="fas fa-paper-plane"></i> Post</button>
                </div>
            </div>

            <div id="post-container">
                </div>
        </section>

        <section id="search" class="section">
            <div class="card glass search-box">
                <h3><i class="fas fa-search"></i> Find Classmates</h3>
                <div class="search-inputs">
                    <input type="text" id="s-inst" placeholder="Institution Name">
                    <input type="number" id="s-year" placeholder="Passout Year">
                    <input type="text" id="s-class" placeholder="Studying Class">
                    <input type="text" id="s-city" placeholder="Institution City">
                </div>
                <button onclick="search()" class="btn-primary"><i class="fas fa-filter"></i> Search</button>
            </div>
            <div id="search-results"></div>
        </section>

        <section id="friends" class="section">
            <h3><i class="fas fa-users"></i> Your Connections</h3>
            <div id="friends-list"></div>
        </section>

        <section id="notifications" class="section">
            <h3><i class="fas fa-bell"></i> Notifications</h3>
            <div id="notif-list"></div>
        </section>

        <section id="profile" class="section">
            <div class="card glass profile-card">
                <img id="p-img" src="" alt="Profile">
                <h2 id="p-name">Username</h2>
                
                <div class="profile-details">
                    <div class="input-group">
                        <label>Institution Name</label>
                        <input type="text" id="p-inst" placeholder="Ex: IIT Madras">
                    </div>
                    <div class="input-group">
                        <label>Passout Year</label>
                        <input type="number" id="p-year" placeholder="Ex: 2020">
                    </div>
                    <div class="input-group">
                        <label>Studying Class</label>
                        <input type="text" id="p-class" placeholder="Ex: B.Tech 4th Year">
                    </div>
                    <div class="input-group">
                        <label>Institution City</label>
                        <input type="text" id="p-city" placeholder="Ex: Hyderabad">
                    </div>
                    
                    <button onclick="saveProfile()" class="btn-primary">Update Profile</button>
                    <button onclick="logout()" class="btn-danger" style="margin-top:10px;">Logout</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav glass">
        <div class="nav-item active-nav" onclick="show('home', this)"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="show('search', this)"><i class="fas fa-search"></i><span>Find</span></div>
        <div class="nav-item" onclick="show('friends', this)"><i class="fas fa-comments"></i><span>Chats</span></div>
        <div class="nav-item" onclick="show('profile', this)"><i class="fas fa-user"></i><span>Profile</span></div>
    </nav>

    <div id="chat-window" class="chat-overlay" style="display:none;">
        <div class="chat-header glass">
            <i class="fas fa-arrow-left" onclick="closeChat()"></i>
            <span id="chat-user">Chat</span>
        </div>
        <div id="chat-msgs" class="chat-content"></div>
        <div class="chat-input-area glass">
            <input type="text" id="chatInput" placeholder="Type a message...">
            <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="ai-trigger" onclick="toggleAI()">
        <i class="fas fa-robot"></i>
    </div>

    <div id="ai-window" class="chat-overlay ai-chat" style="display:none;">
        <div class="chat-header glass">
            <span>Classmate AI</span>
            <i class="fas fa-times" onclick="toggleAI()"></i>
        </div>
        <div id="ai-msgs" class="chat-content"></div>
        <div class="chat-input-area glass">
            <input type="text" id="ai-input" placeholder="Ask AI helper...">
            <button onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
