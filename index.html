<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Classmate Connect</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

nav button{
background:none;
border:none;
font-size:14px;
}

.section{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.primary{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
}

.card{
background:#e3f2fd;
padding:12px;
border-radius:10px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.chatBox{
height:60vh;
overflow:auto;
background:white;
padding:10px;
}

.msg{
padding:8px;
border-radius:10px;
margin:6px;
max-width:60%;
}

.me{
background:#c8e6c9;
margin-left:auto;
}

.other{
background:#eeeeee;
}

</style>
</head>

<body>

<header>Classmate Connect</header>

<!-- LOGIN -->

<div id="login" class="section" style="display:block">

<h3>Login with Phone</h3>

<input id="phone" placeholder="+91XXXXXXXXXX">

<div id="recaptcha"></div>

<button class="primary" onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">

<button class="primary" onclick="verifyOTP()">Verify OTP</button>

</div>

<!-- PROFILE -->

<div id="profile" class="section">

<h3>Create Profile</h3>

<input id="name" placeholder="Name">

<input id="school" placeholder="School / College">

<input id="class" placeholder="Class">

<input id="year" placeholder="Year of Passing">

<input id="city" placeholder="City">

<button class="primary" onclick="saveProfile()">Save Profile</button>

</div>

<!-- NAV -->

<nav>

<button onclick="showSection('find')">Find Classmates</button>

<button onclick="showSection('requests')">Friend Requests</button>

<button onclick="showSection('friends')">Friends</button>

<button onclick="showSection('chatScreen')">Chats</button>

</nav>

<!-- FIND -->

<div id="find" class="section">

<h3>Find Classmates</h3>

<input id="searchSchool" placeholder="School">

<input id="searchYear" placeholder="Year">

<button class="primary" onclick="findUsers()">Search</button>

<div id="results"></div>

</div>

<!-- REQUESTS -->

<div id="requests" class="section">

<h3>Friend Requests</h3>

<div id="requestList"></div>

</div>

<!-- FRIENDS -->

<div id="friends" class="section">

<h3>Your Friends</h3>

<div id="friendsList"></div>

</div>

<!-- CHAT -->

<div id="chatScreen" class="section">

<h3 id="chatName"></h3>

<div class="chatBox" id="chatBox"></div>

<input id="msgInput" placeholder="Type message">

<button class="primary" onclick="sendMsg()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
doc,
setDoc,
addDoc,
getDocs,
onSnapshot,
updateDoc,
query,
where,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
RecaptchaVerifier,
signInWithPhoneNumber,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAK01_ZKFoPQQrpFqoRnlvuH0iVXLF7mqA",

authDomain: "classmate-connect-4ef14.firebaseapp.com",

projectId: "classmate-connect-4ef14",

storageBucket: "classmate-connect-4ef14.firebasestorage.app",

messagingSenderId: "836999548178",

appId: "1:836999548178:web:8fc82fcf07289647c5f7cb"

};

const app=initializeApp(firebaseConfig)

const db=getFirestore(app)

const auth=getAuth(app)

let currentUser
let chatUser
let confirmationResult

window.showSection=function(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

window.recaptcha=new RecaptchaVerifier(auth,"recaptcha",{size:"normal"})

window.sendOTP=async function(){

let phone=document.getElementById("phone").value

confirmationResult=await signInWithPhoneNumber(auth,phone,recaptcha)

alert("OTP Sent")

}

window.verifyOTP=async function(){

let code=document.getElementById("otp").value

let result=await confirmationResult.confirm(code)

currentUser=result.user.phoneNumber

checkProfile()

}

async function checkProfile(){

let docRef=doc(db,"users",currentUser)

let snap=await getDocs(collection(db,"users"))

if(!snap.empty){

showSection("find")

}else{

showSection("profile")

}

}

window.saveProfile=async function(){

await setDoc(doc(db,"users",currentUser),{

name:document.getElementById("name").value,

school:document.getElementById("school").value.toLowerCase(),

class:document.getElementById("class").value,

year:document.getElementById("year").value,

city:document.getElementById("city").value

})

alert("Profile Saved")

showSection("find")

}

window.findUsers=async function(){

let school=document.getElementById("searchSchool").value.toLowerCase()

let year=document.getElementById("searchYear").value

let snapshot=await getDocs(collection(db,"users"))

let html=""

snapshot.forEach(docSnap=>{

let d=docSnap.data()

if(docSnap.id!==currentUser && d.school.includes(school) && d.year==year){

html+=`

<div class="card">

${d.name}

<button onclick="sendRequest('${docSnap.id}')">Add</button>

</div>

`

}

})

document.getElementById("results").innerHTML=html

}

window.sendRequest=async function(id){

await addDoc(collection(db,"friendRequests"),{

from:currentUser,

to:id,

status:"pending"

})

alert("Friend Request Sent")

}

window.sendMsg=async function(){

let text=document.getElementById("msgInput").value

await addDoc(collection(db,"messages"),{

from:currentUser,

to:chatUser,

text:text,

time:Date.now()

})

document.getElementById("msgInput").value=""

}

</script>

</body>
</html>
