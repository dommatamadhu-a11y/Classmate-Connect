<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Classmate Connect</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

nav button{
background:none;
border:none;
font-size:14px;
}

.section{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.primary{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
}

.card{
background:#e3f2fd;
padding:12px;
border-radius:10px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.row{
display:flex;
align-items:center;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
background:#1976d2;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin-right:10px;
}

.chatBox{
height:60vh;
overflow:auto;
background:white;
padding:10px;
}

.msg{
padding:8px;
border-radius:10px;
margin:6px;
max-width:60%;
}

.me{
background:#c8e6c9;
margin-left:auto;
}

.other{
background:#eeeeee;
}

.badge{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
margin-left:4px;
}

</style>
</head>

<body>

<header>Classmate Connect</header>

<nav>
<button onclick="showSection('find')">Find Classmates</button>
<button onclick="showSection('requests')">Friend Requests <span id="reqBadge"></span></button>
<button onclick="showSection('friends')">Friends</button>
<button onclick="showSection('chatScreen')">Chats</button>
</nav>

<div id="profile" class="section" style="display:block">

<h3>Create Profile</h3>

<input id="name" placeholder="Name">

<input id="school" placeholder="School / College">

<input id="class" placeholder="Class">

<input id="year" placeholder="Year of Passing">

<input id="city" placeholder="City">

<button class="primary" onclick="saveProfile()">Save Profile</button>

</div>

<div id="find" class="section">

<h3>Find Classmates</h3>

<input id="searchSchool" placeholder="School">

<input id="searchYear" placeholder="Year">

<button class="primary" onclick="findUsers()">Search</button>

<div id="results"></div>

</div>

<div id="requests" class="section">

<h3>Friend Requests</h3>

<div id="requestList"></div>

</div>

<div id="friends" class="section">

<h3>Your Friends</h3>

<div id="friendsList"></div>

</div>

<div id="chatScreen" class="section">

<h3 id="chatName"></h3>

<div class="chatBox" id="chatBox"></div>

<input id="msgInput" placeholder="Type message">

<button class="primary" onclick="sendMsg()">Send</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
doc,
setDoc,
addDoc,
getDocs,
onSnapshot,
updateDoc,
query,
where,
orderBy
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAK01_ZKFoPQQrpFqoRnlvuH0iVXLF7mqA",

authDomain: "classmate-connect-4ef14.firebaseapp.com",

projectId: "classmate-connect-4ef14",

storageBucket: "classmate-connect-4ef14.firebasestorage.app",

messagingSenderId: "836999548178",

appId: "1:836999548178:web:8fc82fcf07289647c5f7cb",

measurementId: "G-GW98KFSFTR"

};

const app = initializeApp(firebaseConfig)

const db = getFirestore(app)

const auth = getAuth(app)

let currentUser

let chatUser

onAuthStateChanged(auth,user=>{
if(user){
currentUser=user.phoneNumber
}
})

window.showSection=function(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

window.saveProfile=async function(){

await setDoc(doc(db,"users",currentUser),{

name:document.getElementById("name").value,

school:document.getElementById("school").value.toLowerCase(),

class:document.getElementById("class").value,

year:document.getElementById("year").value,

city:document.getElementById("city").value,

createdAt:Date.now()

})

alert("Profile saved")

showSection("find")

}

window.findUsers=async function(){

let school=document.getElementById("searchSchool").value.toLowerCase()

let year=document.getElementById("searchYear").value

let snapshot=await getDocs(collection(db,"users"))

let html=""

snapshot.forEach(docSnap=>{

let d=docSnap.data()

if(docSnap.id!==currentUser && d.school.includes(school) && d.year==year){

let letter=d.name.charAt(0).toUpperCase()

html+=`

<div class="card">

<div class="row">

<div class="avatar">${letter}</div>

<div>

<div>${d.name}</div>

<div>${d.class} - ${d.year}</div>

<div><b>${d.school.toUpperCase()}</b></div>

<div>${d.city}</div>

</div>

</div>

<button onclick="sendRequest('${docSnap.id}')">Add</button>

</div>

`

}

})

document.getElementById("results").innerHTML=html

}

window.sendRequest=async function(id){

let q=query(

collection(db,"friendRequests"),

where("from","==",currentUser),

where("to","==",id)

)

let snap=await getDocs(q)

if(!snap.empty){

alert("Request already sent")

return

}

await addDoc(collection(db,"friendRequests"),{

from:currentUser,

to:id,

status:"pending",

time:Date.now()

})

alert("Friend request sent")

}

function loadRequests(){

let q=query(

collection(db,"friendRequests"),

where("to","==",currentUser),

where("status","==","pending")

)

onSnapshot(q,snapshot=>{

let html=""

document.getElementById("reqBadge").innerText=snapshot.size||""

snapshot.forEach(docSnap=>{

let d=docSnap.data()

html+=`

<div class="card">

${d.from}

<button onclick="acceptRequest('${docSnap.id}','${d.from}')">Accept</button>

</div>

`

})

document.getElementById("requestList").innerHTML=html

})

}

window.acceptRequest=async function(id,from){

await addDoc(collection(db,"friends"),{

user1:currentUser,

user2:from

})

await updateDoc(doc(db,"friendRequests",id),{

status:"accepted"

})

}

function loadFriends(){

onSnapshot(collection(db,"friends"),snapshot=>{

let html=""

snapshot.forEach(docSnap=>{

let d=docSnap.data()

let friend=d.user1===currentUser?d.user2:d.user1

html+=`

<div class="card" onclick="openChat('${friend}')">

${friend}

</div>

`

})

document.getElementById("friendsList").innerHTML=html

})

}

window.openChat=function(id){

chatUser=id

document.getElementById("chatName").innerText=id

showSection("chatScreen")

loadMessages()

}

window.sendMsg=async function(){

let text=document.getElementById("msgInput").value

await addDoc(collection(db,"messages"),{

from:currentUser,

to:chatUser,

text:text,

time:Date.now()

})

document.getElementById("msgInput").value=""

}

function loadMessages(){

let q=query(collection(db,"messages"),orderBy("time"))

onSnapshot(q,snapshot=>{

let html=""

snapshot.forEach(docSnap=>{

let m=docSnap.data()

if(

(m.from===currentUser && m.to===chatUser) ||

(m.from===chatUser && m.to===currentUser)

){

let cls=m.from===currentUser?"msg me":"msg other"

html+=`<div class="${cls}">${m.text}</div>`

}

})

document.getElementById("chatBox").innerHTML=html

})

}

loadRequests()

loadFriends()

</script>

</body>
</html>
