<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classmate Connect</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;}

.header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
}

.top-nav{
display:flex;
background:#1565c0;
}

.top-nav button{
flex:1;
border:none;
background:#1565c0;
color:white;
padding:10px;
}

.section{display:none;padding:15px;}

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:8px;
}

#login{
display:block;
text-align:center;
margin-top:100px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:6px;
margin-top:5px;
}
</style>

</head>

<body>

<div class="header">Classmate Connect</div>

<div class="top-nav">
<button onclick="showSection('find')">Find</button>
<button onclick="showSection('notifications')">🔔</button>
<button onclick="showSection('profile')">Profile</button>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<h2>Login</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- FIND -->
<div id="find" class="section">
<h3>Find</h3>

<input id="searchInstitution" placeholder="Institution">
<input id="searchYear" placeholder="Year">
<input id="searchCity" placeholder="City">

<button onclick="loadUsers()">Search</button>

<div id="findList"></div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifications" class="section">
<h3>Notifications</h3>
<div id="notificationsList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">

<h3>Profile</h3>

<input id="nameInput" placeholder="Name">
<input id="institutionInput" placeholder="Institution">
<input id="yearInput" placeholder="Year">
<input id="cityInput" placeholder="City">

<button onclick="saveProfile()">Save</button>
<button onclick="logout()">Logout</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
