<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classmate Connect Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #1a73e8; --bg: #f8fafc; --card: #ffffff; --text: #1f2937; --success: #10b981; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 85px; overflow-x: hidden; }
        
        /* Splash Screen */
        #splash { position: fixed; inset: 0; background: linear-gradient(135deg, #1a73e8, #60a5fa); color: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        #splash i { font-size: 60px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        header { background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .section { display: none; padding: 15px; animation: fadeIn 0.4s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); margin-bottom: 15px; padding: 18px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, #1a73e8, #60a5fa); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 600; box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--card); border-top: 1px solid #eee; padding: 12px 0; z-index: 1000; border-radius: 20px 20px 0 0; }
        .nav-item { flex: 1; text-align: center; color: #9ca3af; font-size: 11px; cursor: pointer; }
        .active-nav { color: var(--primary); font-weight: 600; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        #feed-container img { width: 100%; border-radius: 12px; margin-top: 10px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>
</head>
<body>

    <div id="splash">
        <i class="fas fa-handshake"></i>
        <h1 style="margin-top: 20px; font-weight: 600;">Classmate Connect</h1>
        <p style="opacity: 0.9;">Global Alumni Network</p>
    </div>

    <div id="login-overlay" style="position:fixed; inset:0; background:white; z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <i class="fas fa-user-circle" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Welcome Back</h2>
        <button onclick="login()" class="btn-primary" style="width:250px;"><i class="fab fa-google"></i> Sign in with Google</button>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <img id="h-img" src="" style="width:40px; height:40px; border-radius:50%; border:2px solid #eee;">
            <div style="margin-left:12px;">
                <span id="u-display" style="font-weight:600; font-size:15px; display:block;">User</span>
                <span id="u-badge" style="font-size:10px; color:var(--primary); font-weight:bold; display:none;">Expert</span>
            </div>
        </div>
        <div style="display:flex; gap:15px; color:#64748b;">
            <i class="fas fa-bell" onclick="show('notifications')"></i>
            <i class="fas fa-cog" onclick="show('profile')"></i>
        </div>
    </header>

    <main>
        <section id="home" class="section active">
            <div id="mem-banner" class="card" style="display:none; background: #e0f2fe; border: 1px solid #bae6fd;">
                <b><i class="fas fa-star"></i> On This Day:</b>
                <p id="mem-text" style="font-size: 13px; margin: 5px 0 0 0;"></p>
            </div>
            <div class="card">
                <textarea id="msgInput" rows="2" placeholder="Share a memory or update..."></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                    <label style="cursor:pointer; color:var(--primary); font-size:20px;">
                        <i class="fas fa-image"></i>
                        <input type="file" id="f-post" hidden accept="image/*">
                    </label>
                    <button onclick="handlePost()" class="btn-primary" style="width:100px; margin:0;">Post</button>
                </div>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="search" class="section">
            <div class="card">
                <h3 style="margin-top:0;">Find Your Classmates</h3>
                <input type="text" id="s-inst" placeholder="Institution Name">
                <input type="number" id="s-year" placeholder="Passout Year">
                <input type="text" id="s-class" placeholder="Studying Class">
                <input type="text" id="s-city" placeholder="Institution City">
                <button onclick="searchClassmates()" class="btn-primary">Search</button>
            </div>
            <div id="search-results"></div>
        </section>

        <section id="notifications" class="section">
            <div class="card"><h3>Requests</h3><div id="notif-list">No new requests</div></div>
            <div class="card"><h3>My Connections</h3><div id="friends-list"></div></div>
        </section>

        <section id="profile" class="section">
            <div class="card" style="text-align:center;">
                <img id="p-img" src="" style="width:100px; height:100px; border-radius:50%; margin-bottom:15px;">
                <input type="text" id="p-name" placeholder="Full Name">
                <input type="text" id="p-inst" placeholder="Institution Name">
                <input type="number" id="p-year" placeholder="Passout Year">
                <input type="text" id="p-class" placeholder="Studying Class">
                <input type="text" id="p-city" placeholder="Institution City">
                <input type="text" id="p-skills" placeholder="Skills (Expertise)">
                <button onclick="updateProfile()" class="btn-primary">Sync Profile & Groups</button>
                <button onclick="logout()" style="background:none; border:none; color:red; margin-top:20px; width:100%;">Sign Out</button>
            </div>
            <h4 style="margin-left:10px;">My Class Groups</h4>
            <div id="auto-groups"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="show('home', this)"><i class="fas fa-home"></i><br>Home</div>
        <div class="nav-item" onclick="show('search', this)"><i class="fas fa-search"></i><br>Search</div>
        <div class="nav-item" onclick="show('notifications', this)"><i class="fas fa-users"></i><br>Circle</div>
        <div class="nav-item" onclick="show('profile', this)"><i class="fas fa-user"></i><br>Profile</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
