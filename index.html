<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Classmate Connect</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5;transition:0.3s;}
body.dark{background:#121212;color:white;}

.header{background:#1976d2;color:white;padding:15px;text-align:center;}

.top-nav{display:flex;overflow-x:auto;background:#1565c0;}
.top-nav button{flex:1;min-width:90px;border:none;background:#1565c0;color:white;padding:12px;}

.section{display:none;padding:15px;padding-bottom:80px;}

.card{background:white;padding:10px;margin:10px 0;border-radius:8px;}
body.dark .card{background:#1e1e1e;}

input{width:100%;padding:8px;margin:5px 0;}
button{padding:6px;margin-top:5px;}

#login{display:block;text-align:center;margin-top:100px;}

.chat-bubble{padding:10px;border-radius:10px;margin:5px 0;max-width:70%;}
.me{background:#1976d2;color:white;margin-left:auto;}
.other{background:#e0e0e0;}
body.dark .other{background:#333;color:white;}

.chat-input{position:fixed;bottom:0;width:100%;display:flex;background:white;padding:10px;}
body.dark .chat-input{background:#1e1e1e;}
.chat-input input{flex:1;}
</style>
</head>

<body>

<div class="header">Classmate Connect</div>

<div class="top-nav">
<button onclick="showSection('find')">Find</button>
<button onclick="showSection('friends')">Friends</button>
<button onclick="showSection('chats')">Chat</button>
<button onclick="showSection('groups')">Groups</button>
<button onclick="showSection('notifications')">🔔</button>
<button onclick="showSection('profile')">Profile</button>
<button onclick="showSection('settings')">⚙️</button>
</div>

<div id="login" class="section">
<h2>Login</h2>
<button onclick="googleLogin()">Login</button>
</div>

<div id="find" class="section">
<input id="searchInstitution" placeholder="Institution">
<input id="searchYear" placeholder="Year">
<input id="searchCity" placeholder="City">
<button onclick="loadUsers()">Search</button>
<div id="findList"></div>
</div>

<div id="friends" class="section">
<div id="friendsList"></div>
</div>

<div id="chats" class="section">
<div id="chatList"></div>
<div class="chat-input">
<input id="chatText" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<div id="groups" class="section">
<div id="groupList"></div>
</div>

<div id="notifications" class="section">
<div id="notificationsList"></div>
</div>

<div id="profile" class="section">
<input id="nameInput" placeholder="Name">
<input id="institutionInput" placeholder="Institution">
<input id="yearInput" placeholder="Year">
<input id="cityInput" placeholder="City">

<button onclick="saveProfile()">Save</button>
<button onclick="logout()">Logout</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">
<h3>Settings ⚙️</h3>
<button onclick="toggleTheme()">Toggle Dark Mode 🌙</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
