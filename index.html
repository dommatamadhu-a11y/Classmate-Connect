<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classmate Connect Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        header { background: var(--card); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .section { display: none; padding: 15px; }
        .active { display: block; }
        .card { background: var(--card); margin-bottom: 15px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; background: var(--card); color: var(--text); }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 600; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--card); border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 11px; cursor: pointer; }
        .active-nav { color: var(--primary); font-weight: 600; }
        .feed-media { width: 100%; border-radius: 8px; margin-top: 10px; }
        #chat-messages, #ai-msgs { height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; background: #f0f2f5; border-radius: 8px; }
        .msg-sent { align-self: flex-end; background: var(--primary); color: white; padding: 8px 12px; border-radius: 15px 15px 0 15px; }
        .msg-received { align-self: flex-start; background: #e4e6eb; color: black; padding: 8px 12px; border-radius: 15px 15px 15px 0; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div id="login-overlay" style="position:fixed; inset:0; background:white; z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center;">
        <h2>Classmate Connect</h2>
        <button onclick="login()" class="btn-primary" style="width:200px;">Login with Google</button>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="h-img" src="" style="width:35px; height:35px; border-radius:50%;">
            <select id="lang-selector" onchange="changeLanguage(this.value)" style="width:auto; padding:2px; font-size:10px;">
                <option value="en">English</option>
                <option value="te">తెలుగు</option>
            </select>
        </div>
        <div style="display:flex; gap:15px;">
            <i class="fas fa-robot" onclick="show('ai-bot')"></i>
            <i class="fas fa-cog" onclick="show('profile')"></i>
        </div>
    </header>

    <main>
        <section id="home" class="section active">
            <div class="card">
                <textarea id="msgInput" data-placeholder="feed_placeholder"></textarea>
                <input type="file" id="f-post" accept="image/*,video/*">
                <button onclick="handlePost()" class="btn-primary" data-key="post_btn">Post</button>
            </div>
            <div id="feed-container"></div>
        </section>

        <section id="search" class="section">
            <div class="card">
                <h3 data-key="search_title">Search</h3>
                <input type="text" id="s-inst" data-placeholder="inst_placeholder">
                <input type="number" id="s-year" data-placeholder="year_placeholder">
                <input type="text" id="s-class" data-placeholder="class_placeholder">
                <input type="text" id="s-city" data-placeholder="city_placeholder">
                <button onclick="searchClassmates()" class="btn-primary" data-key="search_btn_text">Search</button>
            </div>
            <div id="search-results"></div>
        </section>

        <section id="friends" class="section">
            <div id="friends-list"></div>
            <div id="auto-groups" style="margin-top:20px;"></div>
        </section>

        <section id="chat-window" class="section">
            <h4 id="chat-t-name">Chat</h4>
            <div id="chat-messages"></div>
            <input type="text" id="chatInput" data-placeholder="msg_placeholder">
            <button onclick="sendChatMessage()" class="btn-primary">Send</button>
            <label style="font-size:10px;"><input type="checkbox" id="auto-translate"> Auto-translate</label>
        </section>

        <section id="ai-bot" class="section">
            <h3 data-key="ai_title">Career AI</h3>
            <div id="ai-msgs"></div>
            <input type="text" id="aiInput" data-placeholder="ask_ai_placeholder">
            <button onclick="askAI()" class="btn-primary" data-key="ask_btn">Ask AI</button>
        </section>

        <section id="profile" class="section">
            <div class="card">
                <img id="p-img" src="" style="width:60px; border-radius:50%;">
                <input type="text" id="p-name" placeholder="Name">
                <input type="text" id="p-inst" placeholder="Institution">
                <input type="number" id="p-year" placeholder="Year">
                <input type="text" id="p-class" placeholder="Class">
                <input type="text" id="p-city" placeholder="City">
                <input type="text" id="p-skills" placeholder="Skills">
                <button onclick="updateProfile()" class="btn-primary">Save Profile</button>
                <button onclick="logout()" style="background:red; margin-top:10px;" class="btn-primary">Logout</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="show('home', this)">Feed</div>
        <div class="nav-item" onclick="show('search', this)">Search</div>
        <div class="nav-item" onclick="show('friends', this)">Circle</div>
        <div class="nav-item" onclick="show('profile', this)">Profile</div>
    </nav>
    <script src="app.js"></script>
</body>
</html>
