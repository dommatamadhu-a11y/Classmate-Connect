<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Classmate Connect</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f8;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

nav button{
background:none;
border:none;
font-size:14px;
}

.section{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.primary{
background:#1976d2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
}

.card{
background:#e3f2fd;
padding:12px;
border-radius:10px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.chatBox{
height:60vh;
overflow:auto;
background:white;
padding:10px;
}

.msg{
padding:8px;
border-radius:10px;
margin:6px;
max-width:60%;
}

.me{
background:#c8e6c9;
margin-left:auto;
}

.other{
background:#eeeeee;
}

</style>

</head>

<body>

<header>Classmate Connect</header>

<nav>
<button onclick="showSection('find')">Find</button>
<button onclick="showSection('requests')">Requests</button>
<button onclick="showSection('friends')">Friends</button>
<button onclick="showSection('chatScreen')">Chat</button>
</nav>

<div id="login" class="section" style="display:block">

<h3>Login</h3>
<button class="primary" onclick="googleLogin()">Login with Google</button>

</div>


<div id="profile" class="section">

<h3>Create Profile</h3>

<input id="name" placeholder="Name">
<input id="school" placeholder="School">
<input id="year" placeholder="Year">
<input id="city" placeholder="City">

<label>
<input type="checkbox" id="hidePhone">
Hide my phone number
</label>

<button class="primary" onclick="saveProfile()">Save Profile</button>

</div>


<div id="find" class="section">

<h3>Find Classmates</h3>

<input id="searchSchool" placeholder="School">
<input id="searchYear" placeholder="Year">

<button class="primary" onclick="findUsers()">Search</button>

<div id="results"></div>

</div>


<div id="requests" class="section">

<h3>Friend Requests</h3>

<div id="requestList"></div>

</div>


<div id="friends" class="section">

<h3>Your Friends</h3>

<div id="friendsList"></div>

</div>


<div id="chatScreen" class="section">

<h3 id="chatName"></h3>

<div class="chatBox" id="chatBox"></div>

<input id="msgInput" placeholder="Type message">

<button class="primary" onclick="sendMsg()">Send</button>

</div>


<script type="module" src="app.js"></script>

</body>
</html>
