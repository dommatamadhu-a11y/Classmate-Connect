<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Connect Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4361ee">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --bg: #f8f9fd; --white: #ffffff; --text: #2b2d42; --light-text: #8d99ae; --online: #2ec4b6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); overflow-x: hidden; }
        
        /* Header */
        .header-container { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .user-bar { background: rgba(255, 255, 255, 0.1); padding: 8px 15px; font-size: 11px; display: flex; justify-content: space-between; }
        .main-header { padding: 15px; text-align: center; }
        
        /* Sections */
        .section { display: none; padding: 15px; max-width: 500px; margin: auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Cards */
        .card { background: var(--white); padding: 15px; border-radius: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 15px; border: 1px solid #f0f0f0; position: relative; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 14px; background: #fcfdfe; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; width: 100%; }
        .btn-red { background: #ff4d6d; color: white; font-size: 10px; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
        
        /* Feed & Interactions */
        .feed-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid #eee; }
        .post-footer { display: flex; gap: 15px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f1f1f1; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 13px; color: var(--light-text); display: flex; align-items: center; gap: 5px; }
        .comments-area { background: #f9fafb; border-radius: 10px; padding: 10px; margin-top: 10px; font-size: 12px; max-height: 100px; overflow-y: auto; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { border: none; background: none; color: var(--light-text); font-size: 11px; cursor: pointer; text-align: center; position: relative; }
        .active-nav { color: var(--primary); font-weight: bold; }
        .notif-dot { height: 8px; width: 8px; background: #ff4d6d; border-radius: 50%; position: absolute; top: 0; right: 5px; display: none; border: 2px solid white; }

        /* Toast & Chat */
        #toast { visibility: hidden; min-width: 200px; background-color: #333; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 3000; left: 50%; bottom: 85px; transform: translateX(-50%); font-size: 13px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 85px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 85px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        #chat-window { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg-bubble { padding: 10px; border-radius: 12px; margin-bottom: 8px; max-width: 75%; font-size: 14px; word-wrap: break-word; }
        .mine { align-self: flex-end; background: var(--primary); color: white; }
        .theirs { align-self: flex-start; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="toast">Action Successful!</div>

<div class="header-container">
    <div class="user-bar"><span id="header-user-name">Guest</span><span id="header-group-tag">Offline</span></div>
    <div class="main-header"><h3 id="page-title">Home Feed</h3></div>
</div>

<div id="feed" class="section active">
    <div class="card">
        <textarea id="msgInput" rows="2" placeholder="Share a memory..."></textarea>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label for="imageInput" style="cursor:pointer; font-size:22px;">🖼️</label>
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="previewFile('imageInput', 'preview-post')">
            <img id="preview-post" style="width:40px; height:40px; display:none; border-radius:5px; object-fit:cover;">
            <button id="postBtn" class="btn btn-blue" style="width:auto; padding:8px 25px;" onclick="handleFeedPost()">Post</button>
        </div>
    </div>
    <div id="post-container">Loading...</div>
</div>

<div id="friends" class="section">
    <div id="req-area" class="card" style="display:none; border-left:4px solid #ff4d6d;">
        <h4 style="margin:0 0 10px 0;">New Requests</h4>
        <div id="req-list"></div>
    </div>
    <div class="card">
        <h4>🔍 Find Alumni</h4>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <input type="text" id="s-inst" placeholder="Institution">
            <input type="text" id="s-year" placeholder="Year">
            <input type="text" id="s-city" placeholder="City">
            <input type="text" id="s-class" placeholder="Class">
        </div>
        <button class="btn btn-blue" style="margin-top:10px;" onclick="searchAlumni()">Search</button>
    </div>
    <div id="search-results"></div>
    <div id="my-friends-list"></div>
</div>

<div id="settings" class="section">
    <div class="card">
        <h3>Edit Profile</h3>
        <input type="text" id="p-name" placeholder="Full Name">
        <input type="text" id="p-inst" placeholder="Institution">
        <input type="text" id="p-year" placeholder="Year">
        <input type="text" id="p-class" placeholder="Class/Sec">
        <input type="text" id="p-city" placeholder="City">
        <button class="btn btn-blue" onclick="saveProfile()">Update & Sync</button>
    </div>
    <div class="card" style="text-align:center;">
        <button class="btn" style="color:red; background:none; width:100%;" onclick="logout()">Logout</button>
    </div>
</div>

<div id="chat-window">
    <div class="header-container">
        <div class="main-header" style="text-align:left; padding:10px; display:flex; align-items:center;">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px; margin-right:15px;">←</button>
            <div id="chat-title-container">
                <span id="chat-with-name" style="font-weight:bold;">Chat</span>
            </div>
        </div>
    </div>
    <div id="chat-messages"></div>
    <div style="padding:15px; background:white; display:flex; gap:10px;">
        <input type="text" id="privateMsgInput" placeholder="Message..." style="margin:0;">
        <button class="btn btn-blue" style="width:50px; border-radius:50%;" onclick="sendPrivateMessage()">➤</button>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-item active-nav" onclick="show('feed', 'Home Feed', this)">🏠<br>Feed</button>
    <button class="nav-item" onclick="show('friends', 'Friends', this)">
        <span class="notif-dot" id="friend-dot"></span>👥<br>Friends
    </button>
    <button class="nav-item" onclick="show('settings', 'Settings', this)">
        <span class="notif-dot" id="settings-dot"></span>⚙️<br>Settings
    </button>
</div>

<script src="app.js"></script>
</body>
</html>
