<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Connect Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; --bg: #f8f9fd; --white: #ffffff; --text: #2b2d42; --light-text: #8d99ae; --danger: #ef233c; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: var(--text); }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px 25px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        
        .header-container { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; }
        .user-bar { background: rgba(255, 255, 255, 0.1); padding: 10px 15px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .user-bar img { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid white; }
        
        .section { display: none; padding: 15px; max-width: 500px; margin: auto; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); padding: 18px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.02); margin-bottom: 15px; border: 1px solid #f0f0f0; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #edf2f7; border-radius: 12px; box-sizing: border-box; font-size: 14px; }
        
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: var(--primary); color: white; width: 100%; }
        .btn-danger { background: #fff1f2; color: var(--danger); width: 100%; }

        /* Feed Style */
        .post-img { width: 100%; border-radius: 12px; margin: 10px 0; }
        .action-bar { display: flex; gap: 20px; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .action-item { cursor: pointer; font-size: 13px; color: var(--light-text); display: flex; align-items: center; gap: 4px; }
        .comment-box { background: #f8f9fd; padding: 8px; border-radius: 10px; margin-top: 5px; font-size: 12px; border-left: 3px solid var(--primary); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { border: none; background: none; color: var(--light-text); font-size: 11px; text-align: center; }
        .active-nav { color: var(--primary); font-weight: bold; }

        /* Chat Window with Delete */
        #chat-window { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:2000; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg-bubble { padding: 10px 14px; border-radius: 18px; margin-bottom: 5px; max-width: 75%; font-size: 14px; position: relative; }
        .mine { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .theirs { align-self: flex-start; background: white; border-bottom-left-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .delete-btn { font-size: 10px; opacity: 0.6; cursor: pointer; display: block; margin-top: 4px; text-align: right; color: #fff; }
        .theirs .delete-btn { color: var(--danger); }
        .chat-img { width: 100%; border-radius: 10px; }

        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 10px; padding: 12px; position: fixed; left: 50%; bottom: 100px; transform: translateX(-50%); z-index: 10000; }
        #toast.show { visibility: visible; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="color:var(--primary);">Alumni Connect</h2>
        <button class="btn btn-blue" onclick="loginWithGoogle()">Continue with Google</button>
    </div>
</div>

<div id="toast">Message!</div>

<div class="header-container">
    <div class="user-bar">
        <div style="display:flex; align-items:center; gap:8px;">
            <img id="header-user-img" src="" alt="">
            <span id="header-user-name">Welcome</span>
        </div>
        <span id="header-group-tag">Offline</span>
    </div>
    <div style="padding:15px; text-align:center;"><h3 id="page-title" style="margin:0;">Home Feed</h3></div>
</div>

<div id="feed" class="section active">
    <div class="card">
        <textarea id="msgInput" rows="2" placeholder="Share a memory or photo..."></textarea>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label style="cursor:pointer; font-size:20px;">🖼️ <input type="file" id="feedPhotoInput" hidden accept="image/*"></label>
            <button class="btn btn-blue" style="width:100px;" onclick="handleFeedPost()">Post</button>
        </div>
    </div>
    <div id="post-container"></div>
</div>

<div id="friends" class="section">
    <div class="card">
        <h4 style="margin:0 0 10px 0;">🔍 Find Friends</h4>
        <input type="text" id="s-inst" placeholder="School / University / Coaching">
        <div class="grid-2">
            <input type="text" id="s-year" placeholder="Passout Year">
            <input type="text" id="s-class" placeholder="Class / Batch">
        </div>
        <input type="text" id="s-city" placeholder="Current City">
        <button class="btn btn-blue" style="margin-top:10px;" onclick="searchAlumni()">Search</button>
    </div>
    <div id="my-friends-list"></div>
</div>

<div id="settings" class="section">
    <div class="card" style="text-align:center;">
        <img id="p-img-large" style="width:80px; border-radius:50%; border:3px solid var(--primary);">
        <h3 id="p-name-display" style="margin:10px 0;">Name</h3>
        <input type="text" id="p-inst" placeholder="Institution Name">
        <div class="grid-2">
            <input type="text" id="p-year" placeholder="Year">
            <input type="text" id="p-class" placeholder="Batch">
        </div>
        <input type="text" id="p-city" placeholder="City">
        <button class="btn btn-blue" style="margin-top:10px;" onclick="saveProfile()">Update Profile</button>
        <button class="btn" style="margin-top:20px; color:gray;" onclick="logout()">Logout</button>
        <button class="btn btn-danger" style="margin-top:10px;" onclick="deleteAccount()">Delete Account</button>
    </div>
</div>

<div id="chat-window">
    <div class="header-container">
        <div style="padding:15px; display:flex; align-items:center; justify-content:space-between;">
            <div style="display:flex; align-items:center;">
                <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:24px; margin-right:15px;">←</button>
                <span id="chat-with-name" style="font-weight:bold;">Chat</span>
            </div>
            <button onclick="clearChat()" style="background:none; border:none; color:white; font-size:12px;">Clear All</button>
        </div>
    </div>
    <div id="chat-messages"></div>
    <div style="padding:15px; background:white; display:flex; gap:10px; border-top:1px solid #eee;">
        <label style="cursor:pointer; font-size:20px;">📷 <input type="file" id="chatPhotoInput" hidden accept="image/*" onchange="sendPhoto()"></label>
        <input type="text" id="privateMsgInput" placeholder="Message..." style="margin:0;">
        <button class="btn btn-blue" style="width:50px;" onclick="sendPrivateMessage()">➤</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active-nav" onclick="show('feed', 'Home Feed', this)">🏠<br>Home</div>
    <div class="nav-item" onclick="show('friends', 'Friends', this)">👥<br>Friends</div>
    <div class="nav-item" onclick="show('settings', 'Settings', this)">⚙️<br>Settings</div>
</div>

<script src="app.js"></script>
</body>
</html>
