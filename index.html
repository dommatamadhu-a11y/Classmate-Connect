<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Classmate Connect</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --sub: #64748b; --danger: #ef4444; --whatsapp: #25d366; }
        .dark-mode { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --sub: #94a3b8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 75px; transition: 0.3s; }
        .header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(0,0,0,0.1); z-index: 100; }
        .nav-item { color: var(--sub); font-size: 20px; cursor: pointer; flex: 1; text-align: center; position: relative; }
        .active-nav { color: var(--primary); }
        .notification-dot { position: absolute; top: -5px; right: 30%; width: 10px; height: 10px; background: var(--danger); border-radius: 50%; display: none; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .section { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        input, textarea { width: 93%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; background: var(--card); color: var(--text); outline: none; }
        .btn { padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 600; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-blue { background: var(--primary); color: white; }
        .post-img, .chat-img { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 300px; object-fit: cover; }
        .post-actions { display: flex; gap: 20px; padding: 10px 0; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 10px; }
        .action-btn { cursor: pointer; color: var(--sub); font-size: 14px; }
        .action-btn.liked { color: var(--danger); }
        .comment-section { margin-top: 10px; display: none; }
        .comment-item { font-size: 13px; background: #f1f5f9; padding: 8px; border-radius: 8px; margin-bottom: 5px; color: #333; }
        .msg-bubble { padding: 10px 15px; border-radius: 18px; margin: 5px 0; max-width: 75%; font-size: 14px; cursor: pointer; }
        .mine { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .theirs { background: #e2e8f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        #login-overlay { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #toast { visibility: hidden; min-width: 200px; background: #1e293b; color: #fff; text-align: center; padding: 12px; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); border-radius: 25px; z-index: 1000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2 style="color:var(--primary)">Classmate Connect</h2>
    <button class="btn btn-blue" style="width:240px" onclick="loginWithGoogle()"><i class="fab fa-google"></i> Sign in with Google</button>
</div>

<div class="header">
    <span onclick="toggleDarkMode()"><i class="fas fa-university"></i> Classmate Connect</span>
    <img id="header-user-img" src="" width="35" height="35" style="border-radius:50%; object-fit:cover;">
</div>

<div class="container">
    <div id="feed" class="section active">
        <div class="card">
            <textarea id="msgInput" placeholder="Post to your batch..."></textarea>
            <div style="display:flex; gap:10px;">
                <input type="file" id="feedPhotoInput" accept="image/*" style="font-size:11px;">
                <button class="btn btn-blue" style="width:100px" onclick="handleFeedPost()">Post</button>
            </div>
        </div>
        <div id="post-container"></div>
    </div>

    <div id="network" class="section">
        <div id="requests-section" class="card" style="display:none;">
            <h4>Requests</h4><div id="requests-list"></div>
        </div>
        <div class="card">
            <h4><i class="fas fa-search"></i> Advanced Search</h4>
            <input type="text" id="s-inst" placeholder="Institution Name">
            <input type="text" id="s-city" placeholder="City">
            <input type="text" id="s-class" placeholder="Class/Branch">
            <input type="number" id="s-year" placeholder="Passout Year">
            <button class="btn btn-blue" onclick="searchClassmates()">Search Directory</button>
        </div>
        <div id="search-results"></div>
    </div>

    <div id="profile" class="section">
        <div class="card" style="text-align:center;">
            <img id="p-img-large" src="" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--primary);">
            <h3 id="p-name-display"></h3>
            <button class="btn" style="background:var(--whatsapp); color:white;" onclick="inviteFriends()"><i class="fab fa-whatsapp"></i> Invite Batch</button>
        </div>
        <div class="card">
            <h4>Education Info</h4>
            <input type="text" id="p-inst" placeholder="Institution">
            <input type="text" id="p-city" placeholder="City">
            <input type="text" id="p-class" placeholder="Class">
            <input type="number" id="p-year" placeholder="Year">
            <button class="btn btn-blue" onclick="saveProfile()">Save Profile</button>
            <button class="btn" style="margin-top:10px; background:#eee;" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<div id="chat-window" style="display:none; position:fixed; inset:0; background:var(--bg); z-index:200; flex-direction:column;">
    <div class="header">
        <span onclick="closeChat()"><i class="fas fa-arrow-left"></i> <span id="chat-with-name">Chat</span></span>
        <button id="block-btn" onclick="toggleBlock()" style="background:none; border:1px solid white; color:white; border-radius:5px;">Block</button>
    </div>
    <div id="chat-messages" style="flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column;"></div>
    <div id="chat-input-area" style="padding:10px; background:var(--card); display:flex; gap:10px;">
        <label for="chatImageInput" style="font-size:22px; cursor:pointer;"><i class="fas fa-image"></i></label>
        <input type="file" id="chatImageInput" accept="image/*" style="display:none;" onchange="sendChatImage()">
        <input type="text" id="privateMsgInput" placeholder="Message..." style="flex:1; margin-bottom:0;">
        <button onclick="sendPrivateMessage()" class="btn-blue" style="width:40px; border-radius:50%;"><i class="fas fa-paper-plane"></i></button>
    </div>
    <div id="blocked-msg" style="display:none; text-align:center; color:red; padding:10px;">User Blocked</div>
</div>

<div class="nav-bottom">
    <div class="nav-item active-nav" onclick="show('feed', event, this)"><i class="fas fa-home"></i></div>
    <div class="nav-item" onclick="show('network', event, this)"><i class="fas fa-users"></i><div id="request-dot" class="notification-dot"></div></div>
    <div class="nav-item" onclick="show('profile', event, this)"><i class="fas fa-user"></i></div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="app.js"></script>
</body>
</html>
