<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Classmate Connect</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#000;
color:white;
padding:15px;
font-size:22px;
}

.nav{
display:flex;
flex-wrap:wrap;
background:#1976d2;
}

.nav button{
flex:1;
padding:10px;
border:none;
background:#1976d2;
color:white;
}

.section{
display:none;
padding:15px;
}

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:6px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

button{
padding:6px 10px;
margin-top:5px;
}

#login{
display:block;
}

</style>

</head>

<body>

<div class="header">
Classmate Connect
</div>

<div class="nav">

<button onclick="showSection('find')">Find Batchmates</button>
<button onclick="showSection('friends')">Friends</button>
<button onclick="showSection('chats')">Chats</button>
<button onclick="showSection('groups')">Groups</button>
<button onclick="showSection('memories')">Memories</button>
<button onclick="showSection('profile')">Profile</button>

</div>

<!-- LOGIN -->

<div id="login" class="section">

<h3>Login</h3>

<button onclick="googleLogin()">Login with Google</button>

</div>

<!-- FIND -->

<div id="find" class="section">

<h3>Find Batchmates</h3>

<input id="searchInstitution" placeholder="Institution">
<input id="searchYear" placeholder="Year">

<button onclick="loadUsers()">Search</button>

<div id="findList"></div>

</div>

<!-- FRIENDS -->

<div id="friends" class="section">

<h3>Friends</h3>

<div id="friendsList"></div>

</div>

<!-- CHATS -->

<div id="chats" class="section">

<h3>Chats</h3>

<div id="chatList"></div>

</div>

<!-- GROUPS -->

<div id="groups" class="section">

<h3>Groups</h3>

<div id="groupList"></div>

</div>

<!-- MEMORIES -->

<div id="memories" class="section">

<h3>Memories</h3>

<input id="memoryCaption" placeholder="Write memory">

<button onclick="uploadMemory()">Post</button>

<div id="memoriesList"></div>

</div>

<!-- PROFILE -->

<div id="profile" class="section">

<h3>Profile</h3>

<input id="name" placeholder="Name">
<input id="nickname" placeholder="Nickname">
<input id="institution" placeholder="School / College">
<input id="course" placeholder="Course">
<input id="year" placeholder="Year">
<input id="city" placeholder="City">

<button onclick="saveProfile()">Save</button>
<button onclick="logout()">Logout</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
