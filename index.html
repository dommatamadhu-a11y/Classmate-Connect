<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Classmate Connect</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.section{
display:none;
padding:15px;
}

button{
padding:10px;
border:none;
background:#1976d2;
color:white;
width:100%;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

.card{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<header>Classmate Connect</header>


<!-- LOGIN -->

<div id="login" class="section" style="display:block">

<h3>Login</h3>

<button onclick="googleLogin()">Login with Google</button>

</div>


<!-- PROFILE -->

<div id="profile" class="section">

<h3>Create Profile</h3>

<input id="name" placeholder="Name">

<input id="school" placeholder="School / College">

<input id="year" placeholder="Year of Passing">

<input id="city" placeholder="City">

<button onclick="saveProfile()">Save Profile</button>

</div>


<!-- FIND CLASSMATES -->

<div id="find" class="section">

<h3>Find Classmates</h3>

<input id="searchSchool" placeholder="School">

<input id="searchYear" placeholder="Year">

<button onclick="findUsers()">Search</button>

<div id="results"></div>

</div>


<script type="module" src="app.js"></script>

</body>

</html>
