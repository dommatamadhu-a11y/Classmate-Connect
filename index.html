<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classmate Connect Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #333; --success: #28a745; --danger: #dc3545; --wa: #25D366; }
        body.dark { --bg: #18191a; --card: #242526; --text: #e4e6eb; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 70px; transition: 0.3s; }
        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .section { display: none; padding: 10px; }
        .active { display: block; }
        .card { background: var(--card); margin-bottom: 15px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0 12px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; background: var(--card); color: var(--text); font-size: 14px; }
        label { font-size: 12px; font-weight: 600; color: #666; display: block; text-align: left; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 600; margin-bottom: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; background: var(--card); border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #888; cursor: pointer; font-size: 10px; flex: 1; }
        .active-nav { color: var(--primary); font-weight: 600; }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; }
        .comment-box { border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
        .comment-item { font-size: 13px; margin-bottom: 5px; padding: 5px; background: #f8f9fa; border-radius: 5px; }
        .comment-item b { color: var(--primary); }
        #chat-messages { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .msg-sent { align-self: flex-end; background: var(--primary); color: white; padding: 8px 12px; border-radius: 15px 15px 0 15px; }
        .msg-received { align-self: flex-start; background: #e9ecef; color: black; padding: 8px 12px; border-radius: 15px 15px 15px 0; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="login-overlay" style="position:fixed; inset:0; background:white; z-index:2000; display:none; flex-direction:column; align-items:center; justify-content:center;">
        <h1>Classmate Connect</h1>
        <button onclick="login()" class="btn-primary" style="width:250px;">Login with Google</button>
    </div>

    <header>
        <div style="display:flex; align-items:center;">
            <img id="h-img" src="" style="width:35px; height:35px; border-radius:50%; margin-right:8px; object-fit: cover;">
            <span id="u-display" style="font-weight: 600;">Loading...</span>
        </div>
        <div style="display:flex; gap:15px;">
            <i class="fas fa-robot" onclick="show('ai-bot')"></i>
            <i class="fas fa-moon" onclick="toggleDarkMode()"></i>
        </div>
    </header>

    <main>
        <section id="home" class="section active">
            <div id="story-list" class="story-container" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:15px;"></div>
            <div class="card">
                <textarea id="msgInput" rows="2" placeholder="Share an update..."></textarea>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label><i class="fas fa-image" style="color:var(--primary); font-size: 20px;"></i><input type="file" id="f-img" hidden accept="image/*"></label>
                    <button onclick="handlePost()" class="btn-primary" style="width:80px; margin-bottom:0;">Post</button>
                </div>
            </div>
            <div id="post-container"></div>
        </section>

        <section id="search" class="section">
            <div class="card">
                <h3>Find Classmates</h3>
                <label>Institution Name</label><input type="text" id="s-inst">
                <label>Passout Year</label><input type="number" id="s-year">
                <label>Studying Class</label><input type="text" id="s-class">
                <label>Institution City</label><input type="text" id="s-city">
                <button onclick="search()" class="btn-primary">Search</button>
            </div>
            <div id="search-results"></div>
        </section>

        <section id="friends" class="section">
            <div class="card"><h3>Friends</h3></div>
            <div id="friends-list"></div>
        </section>

        <section id="chat-window" class="section">
            <div class="card" style="display:flex; align-items:center; gap:10px; padding: 10px;">
                <i class="fas fa-arrow-left" onclick="show('friends')"></i>
                <b id="chat-friend-name">Chat</b>
            </div>
            <div id="chat-messages"></div>
            <div style="display:flex; gap:8px; padding:10px;">
                <input type="text" id="chatInput" placeholder="Type here...">
                <button onclick="sendMessage()" class="btn-primary" style="width:45px; margin-bottom:0;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </section>

        <section id="profile" class="section">
            <div class="card" style="text-align:center;">
                <img id="p-img" src="" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--primary);">
                <label>Full Name</label><input type="text" id="p-name-input">
                <label>Institution Name</label><input type="text" id="p-inst">
                <label>Passout Year</label><input type="number" id="p-year">
                <label>Studying Class</label><input type="text" id="p-class">
                <label>Institution City</label><input type="text" id="p-city">
                <button onclick="saveProfile()" class="btn-primary">Update Profile</button>
                <button onclick="logout()" style="background:var(--danger);" class="btn-primary">Logout</button>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active-nav" onclick="show('home', this)"><i class="fas fa-home"></i><br>Feed</div>
        <div class="nav-item" onclick="show('search', this)"><i class="fas fa-search"></i><br>Search</div>
        <div class="nav-item" onclick="show('friends', this)"><i class="fas fa-users"></i><br>Friends</div>
        <div class="nav-item" onclick="show('profile', this)"><i class="fas fa-user-circle"></i><br>Profile</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
