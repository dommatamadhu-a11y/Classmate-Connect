<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Classmate Connect</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

nav{
display:flex;
background:#eee;
}

nav button{
flex:1;
padding:10px;
border:none;
background:#eee;
}

.section{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button.primary{
background:#1976d2;
color:white;
border:none;
padding:10px;
margin-top:10px;
width:100%;
}

.card{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>

</head>

<body>

<header>Classmate Connect</header>

<nav>

<button onclick="showSection('find')">Find Classmates</button>

<button onclick="showSection('requests')">Friend Requests</button>

</nav>


<!-- LOGIN -->

<div id="login" class="section" style="display:block">

<h3>Login</h3>

<button class="primary" onclick="googleLogin()">

Login with Google

</button>

</div>



<!-- PROFILE -->

<div id="profile" class="section">

<h3>Create Profile</h3>

<input id="name" placeholder="Name">

<input id="school" placeholder="School">

<input id="year" placeholder="Year">

<input id="city" placeholder="City">

<button class="primary" onclick="saveProfile()">

Save Profile

</button>

</div>



<!-- FIND CLASSMATES -->

<div id="find" class="section">

<h3>Find Classmates</h3>

<input id="searchSchool" placeholder="School">

<input id="searchYear" placeholder="Year">

<button class="primary" onclick="findUsers()">

Search

</button>

<div id="results"></div>

</div>



<!-- FRIEND REQUESTS -->

<div id="requests" class="section">

<h3>Friend Requests</h3>

<div id="requestList"></div>

</div>



<script type="module" src="app.js"></script>

</body>

</html>
